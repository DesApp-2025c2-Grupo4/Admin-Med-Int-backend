openapi: 3.0.0
info:
  title: Medicina Integral - Administración
  version: 1.0.0
  description: API para gestionar afiliados, grupo familiar y prestadores con sus agendas.

servers:
  - url: http://localhost:4000

# Tags
tags:
  - name: Persona
    description: Operaciones relacionadas con personas (afiliados/titulares) y sus datos de contacto.
  - name: Grupo familiar
    description: Operaciones relacionadas con grupos familiares.
  - name: Prestador
    description: Operaciones relacionadas con prestadores y sus datos de contacto.
  - name: Agenda
    description: Operaciones relacionadas con la gestión de agendas.

paths:
  # Persona
  /persona:
    get:
      tags:
        - Persona
      summary: Obtener todas las personas/usuarios
      description: Retorna una lista de todas las personas registradas.
      responses:
        '200':
          description: Lista de personas obtenida exitosamente
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Persona'
        '500':
          description: Error del servidor
    post:
      tags:
        - Persona
      summary: Crear una nueva persona
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PersonaRequest' 
      responses:
        '201':
          description: Persona creada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Persona'
  /persona/afiliados:
    get:
      tags:
        - Persona
      summary: Obtener todos los afiliados
      responses:
        '200':
          description: Lista de afiliados obtenida con éxito
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Persona'
  /persona/afiliados/por-periodo:
    get:
      tags:
        - Persona
      summary: Obtener afiliados por período
      parameters:
        - in: query
          name: fechaDesde
          schema: { type: string, format: date }
          required: true
          description: Fecha de inicio del período (YYYY-MM-DD).
        - in: query
          name: fechaHasta
          schema: { type: string, format: date }
          required: true
          description: Fecha de fin del período (YYYY-MM-DD).
      responses:
        '200':
          description: Lista de afiliados por período
  /persona/{id}:
    get:
      tags:
        - Persona
      summary: Obtener persona por ID
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Persona obtenida con éxito
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Persona'
    put:
      tags:
        - Persona
      summary: Actualizar datos de la persona
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PersonaUpdateRequest' 
      responses:
        '200':
          description: Persona actualizada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Persona'
    delete:
      tags:
        - Persona
      summary: Eliminar una persona
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        '204':
          description: Persona eliminada
  
  # Contactos de personas
  /persona/{personaId}/telefonos:
    get:
      tags:
        - Persona
      summary: Obtener teléfonos de una persona
      parameters:
        - in: path
          name: personaId
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Lista de teléfonos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Telefono'
    post:
      tags:
        - Persona
      summary: Agregar teléfono a una persona
      parameters:
        - in: path
          name: personaId
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Telefono'
      responses:
        '201':
          description: Teléfono agregado
  /persona/{personaId}/emails:
    get:
      tags:
        - Persona
      summary: Obtener emails de una persona
      parameters:
        - in: path
          name: personaId
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Lista de emails
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Email'
    post:
      tags:
        - Persona
      summary: Agregar email a una persona
      parameters:
        - in: path
          name: personaId
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Email'
      responses:
        '201':
          description: Email agregado
  /persona/{personaId}/direcciones:
    get:
      tags:
        - Persona
      summary: Obtener direcciones de una persona
      parameters:
        - in: path
          name: personaId
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Lista de direcciones
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Direccion'
    post:
      tags:
        - Persona
      summary: Agregar dirección a una persona
      parameters:
        - in: path
          name: personaId
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Direccion'
      responses:
        '201':
          description: Dirección agregada
  /persona/{personaId}/situaciones:
    get:
      tags:
        - Persona
      summary: Obtener situaciones de una persona
      parameters:
        - in: path
          name: personaId
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Lista de situaciones
    post:
      tags:
        - Persona
      summary: Agregar situación a una persona
      parameters:
        - in: path
          name: personaId
          required: true
          schema: { type: integer }
        - in: path
          name: situacionId
          required: true
          schema: { type: integer }
      responses:
        '201':
          description: Situación agregada
    delete:
      tags:
        - Persona
      summary: Eliminar situación de una persona
      parameters:
        - in: path
          name: personaId
          required: true
          schema: { type: integer }
        - in: path
          name: situacionId
          required: true
          schema: { type: integer }
      responses:
        '204':
          description: Situación eliminada

  # Prestador
  /prestador:
    get:
      tags:
        - Prestador
      summary: Obtener todos los prestadores
      description: Retorna una lista de todos los prestadores registrados.
      responses:
        '200':
          description: Lista de prestadores obtenida
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Prestador'
        '500':
          description: Error del servidor
    post:
      tags:
        - Prestador
      summary: Crear un nuevo prestador
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Prestador'
      responses:
        '201':
          description: Prestador creado
  /prestador/{id}:
    get:
      tags:
        - Prestador
      summary: Obtener prestador por ID
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Prestador obtenido
    put:
      tags:
        - Prestador
      summary: Actualizar prestador
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PrestadorUpdate'
      responses:
        '200':
          description: Prestador actualizado
    delete:
      tags:
        - Prestador
      summary: Eliminar prestador
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        '204':
          description: Prestador eliminado
  
  # Contactos de prestador
  /prestador/{prestadorId}/telefonos:
    get:
      tags:
        - Prestador
      summary: Obtener teléfonos de un prestador
      parameters:
        - in: path
          name: prestadorId
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Lista de teléfonos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Telefono'
    post:
      tags:
        - Prestador
      summary: Agregar teléfono a un prestador
      parameters:
        - in: path
          name: prestadorId
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Telefono'
      responses:
        '201':
          description: Teléfono agregado
  /prestador/{prestadorId}/emails:
    get:
      tags:
        - Prestador
      summary: Obtener emails de un prestador
      parameters:
        - in: path
          name: prestadorId
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Lista de emails
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Email'
    post:
      tags:
        - Prestador
      summary: Agregar email a un prestador
      parameters:
        - in: path
          name: prestadorId
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Email'
      responses:
        '201':
          description: Email agregado
  
  # Agendo
  /agenda:
    get:
      tags:
        - Agenda
      summary: Obtener todas las agendas
      responses:
        '200':
          description: Lista de agendas obtenida
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Agenda'
        '500':
          description: Error del servidor
    post:
      tags:
        - Agenda
      summary: Crear una nueva agenda
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Agenda'
      responses:
        '201':
          description: Agenda creada

  # Grupo familiar
  /grupo:
    get:
      tags:
        - Grupo familiar
      summary: Obtener todos los grupos familiares
      responses:
        '200':
          description: Lista de grupos familiares obtenida
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/GrupoFamiliar'
        '500':
          description: Error del servidor
    post:
      tags:
        - Grupo familiar
      summary: Crear un nuevo grupo familiar
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GrupoFamiliar'
      responses:
        '201':
          description: Grupo familiar creado
  /grupo/{id}:
    get:
      tags:
        - Grupo familiar
      summary: Obtener grupo familiar por ID
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Grupo familiar obtenido
    put:
      tags:
        - Grupo familiar
      summary: Actualizar grupo familiar
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GrupoFamiliarUpdate'
      responses:
        '200':
          description: Grupo familiar actualizado
    delete:
      tags:
        - Grupo familiar
      summary: Eliminar grupo familiar
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        '204':
          description: Grupo familiar eliminado

# Schemas
components:
  schemas:
    Persona:
      type: object
      properties:
        personaId:
          type: integer
          readOnly: true
          example: 101
          description: Clave primaria de la persona.
        nombre:
          type: string
          example: Juan
        parentesco:
          type: string
          nullable: true
          example: Titular
        apellido:
          type: string
          example: Pérez
        dni:
          type: string
          example: '12345678'
        esTitular:
          type: boolean
          example: true
        fechaNacimiento:
          type: string
          format: date
          example: '1980-05-15'
        fechaAlta:
          type: string
          format: date
          readOnly: true
          example: '2025-11-03'
        fechaBaja:
          type: string
          format: date
          nullable: true
          example: null
        credencial:
          type: string
          example: '000001-01'
        idGrupo:
          type: integer
          example: 1
        tipoDocId:
          type: integer
          example: 1
        esActivo:
          type: integer
          readOnly: true
          example: 1
      required:
        - nombre
        - apellido
        - dni
        - esTitular
        - fechaNacimiento
        - credencial
        - idGrupo
        - tipoDocId

    Prestador:
      type: object
      properties:
        nombre: { type: string, example: "Dr. Gómez" }
        especialidad: { type: string, example: "Cardiología" }
    PrestadorUpdate:
      type: object
      properties:
        nombre: { type: string, example: "Dra. Gómez" }

    Agenda:
      type: object
      properties:
        prestadorId: { type: integer, example: 10 }
        fecha: { type: string, format: date, example: "2025-12-31" }
        horaInicio: { type: string, format: time, example: "09:00:00" }
      required: 
        - prestadorId
        - fecha
        - horaInicio

    GrupoFamiliar: 
      type: object
      properties:
        titularId: { type: integer, example: 1 }
        descripcion: { type: string, example: "Grupo Titular Juan Pérez" }
      required:
        - titularId
        - descripcion
    GrupoFamiliarUpdate:
      type: object
      properties:
        descripcion: { type: string, example: "Nuevo nombre del Grupo" }


    Telefono:
      type: object
      description: Telefono.
      properties:
        nroTelefono: { type: string, example: "1155551234" }
      required:
        - nroTelefono
    
    Email:
      type: object
      properties:
        descripcion: { type: string, example: "personal@ejemplo.com" }
      required:
        - descripcion
        
    Direccion:
      type: object
      description: Direccion.
      properties:
        calle: 
          type: string
          example: "Av. Falsa"
          description: Nombre de la calle (Requerido).
        nro: 
          type: integer
          example: 123
          description: Número de la dirección.
      required:
        - calle

    SituacionTerapeuticaAsociada:
      type: object
      description: Datos necesarios para crear la relación en la tabla SituacionPersona.
      properties:
        situacionId: 
          type: integer
          example: 5
          description: ID de la situación terapéutica.
        esCronica:
          type: boolean
          example: false
          description: Indica si la situación es crónica.
        fechaInicio:
          type: string
          format: date
          example: '2025-11-04'
          description: Fecha de inicio de la situación terapéutica.
      required:
        - situacionId
        - esCronica

    PersonaRequest:
      type: object
      description: Schema para la creación de una nueva Persona.
      properties:
        nombre: { type: string, example: Sofia }
        apellido: { type: string, example: Gomez }
        dni: { type: string, example: '45123789' }
        fechaNacimiento: { type: string, format: date, example: '2005-08-20' }
        idGrupo: { type: integer, example: 1 }
        tipoDocId: { type: integer, example: 1 }
        parentesco: { type: string, nullable: true, example: Hijo/a }
        esTitular: { type: boolean, readOnly: true, description: "Generado por el servidor." }
        credencial: { type: string, readOnly: true, description: "Generado por el servidor." }
        direcciones:
          type: array
          minItems: 1
          items: { $ref: '#/components/schemas/Direccion' }
        telefonos:
          type: array
          minItems: 1
          items: { $ref: '#/components/schemas/Telefono' }
        emails:
          type: array
          minItems: 1
          items: { $ref: '#/components/schemas/Email' }
        situacionesTerapeuticas:
          type: array
          description: Lista opcional de situaciones terapéuticas a asociar.
          items: { $ref: '#/components/schemas/SituacionTerapeuticaAsociada' }

      required:
        - nombre
        - apellido
        - dni
        - fechaNacimiento
        - idGrupo
        - tipoDocId
        - direcciones
        - telefonos
        - emails

    PersonaUpdateRequest:
      type: object
      description: Schema para el update de una Persona. 
      properties:
        nombre: { type: string, example: "Juan Carlos" }
        apellido: { type: string, example: "Pérez García" }
        dni: { type: string, example: '12345678' }
        fechaNacimiento: { type: string, format: date, example: '1980-05-15' }
        parentesco: { type: string, nullable: true, example: "Cónyuge" }
        fechaBaja: { type: string, format: date, nullable: true, example: '2026-01-01' }
        idGrupo: { type: integer, example: 1 }
        tipoDocId: { type: integer, example: 1 }